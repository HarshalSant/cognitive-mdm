name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  # ─── Python Service Tests ─────────────────────────────────────
  test-python:
    name: Python Tests (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - entity-resolution
          - semantic-engine
          - graph-service
          - governance-service
          - agent-service
          - copilot-service
          - ingestion-service

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        working-directory: services/${{ matrix.service }}
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]" 2>/dev/null || pip install -r requirements.txt 2>/dev/null || \
            pip install fastapi uvicorn pytest pytest-asyncio httpx pydantic structlog || true

      - name: Lint
        working-directory: services/${{ matrix.service }}
        run: |
          pip install ruff
          ruff check src/ || true

      - name: Type check
        working-directory: services/${{ matrix.service }}
        run: |
          pip install mypy
          mypy src/ --ignore-missing-imports || true

      - name: Run tests
        working-directory: services/${{ matrix.service }}
        run: |
          if [ -d "tests" ]; then
            pytest tests/ -v --tb=short --timeout=60
          else
            echo "No tests directory, skipping"
          fi

  # ─── Frontend Tests ───────────────────────────────────────────
  test-frontend:
    name: Frontend Build & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Type check
        working-directory: frontend
        run: npm run type-check

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

  # ─── Docker Build ─────────────────────────────────────────────
  docker-build:
    name: Docker Build (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: [test-python, test-frontend]
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service:
          - api-gateway
          - entity-resolution
          - semantic-engine
          - graph-service
          - governance-service
          - agent-service
          - copilot-service
          - ingestion-service
          - frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service == 'frontend' && 'frontend' || format('services/{0}', matrix.service) }}
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/cognitive-mdm-${{ matrix.service }}:latest
            ghcr.io/${{ github.repository }}/cognitive-mdm-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Security Scan ────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
